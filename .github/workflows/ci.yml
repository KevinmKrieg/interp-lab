name: CI

on:
  push:
  pull_request:

jobs:
  toy-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Run toy report smoke
        run: |
          collect-activations
          run-patching
          train-sae
          analyze-features
          train-nla-toy
          serve-browser --build-only
