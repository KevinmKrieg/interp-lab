seed: 7
model:
  backend: hf
  name: gpt2
  device: cpu
data:
  n_examples: 48
  seq_len: 7
  layer_for_sae: 6
  clean_prompt: "A B C A B"
  corrupt_prompt: "A B C A D"
  correct_token: " C"
  incorrect_token: " D"
training:
  sae_steps: 120
  sae_features: 128
  nla_steps: 120
outputs:
  artifacts_dir: artifacts/gpt2
  reports_dir: reports/gpt2
